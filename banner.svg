<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" fill="none" width="1200" height="340">
  <defs>
    <!-- Mesh gradient orbs -->
    <radialGradient id="orb1" cx="18%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="82%" cy="78%" r="50%">
      <stop offset="0%" stop-color="#A371F7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A371F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="65%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#79C0FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#79C0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb4" cx="35%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#FF7B72" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF7B72" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F6FC"/>
      <stop offset="100%" stop-color="#C9D1D9"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#79C0FF"/>
      <stop offset="100%" stop-color="#A371F7"/>
    </linearGradient>
    <!-- Subtitle gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#A371F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="#0D1117"/>

  <!-- Mesh orbs -->
  <rect width="1200" height="340" fill="url(#orb1)"/>
  <rect width="1200" height="340" fill="url(#orb2)"/>
  <rect width="1200" height="340" fill="url(#orb3)"/>
  <rect width="1200" height="340" fill="url(#orb4)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="340" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Decorative corner brackets -->
  <path d="M 40 40 L 40 70 M 40 40 L 70 40" stroke="#58A6FF" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
  <path d="M 1160 300 L 1160 270 M 1160 300 L 1130 300" stroke="#A371F7" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>

  <!-- Available indicator dot -->
  <circle cx="540" cy="100" r="4" fill="#3FB950"/>
  <circle cx="540" cy="100" r="7" fill="#3FB950" fill-opacity="0.3"/>
  <text x="555" y="104" font-family="JetBrains Mono, monospace" font-size="11" fill="#3FB950" letter-spacing="0.5">available for work</text>

  <!-- Name -->
  <text x="600" y="180" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="68" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2.5">Aryan Thakare</text>

  <!-- Subtitle -->
  <text x="600" y="218" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="url(#subGrad)" text-anchor="middle" letter-spacing="0.3">Systems Engineer  —  Kernel  ·  Full-Stack Web  ·  Applied AI</text>

  <!-- Monospace metadata strip -->
  <text x="600" y="268" font-family="JetBrains Mono, monospace" font-size="12" fill="#7D8590" text-anchor="middle" letter-spacing="0.3">// location: India · IST (UTC+5:30)   // stack: C · C++ · Python · TS · Rust   // focus: kernel · web · ai</text>

  <!-- Bottom accent line -->
  <rect x="0" y="338" width="1200" height="2" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
